<svg width="480" height="680" viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- gold card gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9e7a0"/>
      <stop offset="35%" stop-color="#e8c968"/>
      <stop offset="65%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8842b"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#8a6b1f"/>
    </linearGradient>
    <!-- shimmer sweep -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- stat bar gradient -->
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4f12"/>
      <stop offset="100%" stop-color="#3a2d0c"/>
    </linearGradient>
    <!-- card shape clip -->
    <clipPath id="cardClip">
      <path d="M240 24
               C 300 24 356 38 398 52
               L 398 420
               C 398 520 330 600 240 648
               C 150 600 82 520 82 420
               L 82 52
               C 124 38 180 24 240 24 Z"/>
    </clipPath>
    <radialGradient id="photoGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fff8dd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- outer glow pulse -->
  <path d="M240 16
           C 303 16 362 31 406 46
           L 406 422
           C 406 526 335 608 240 657
           C 145 608 74 526 74 422
           L 74 46
           C 118 31 177 16 240 16 Z"
        fill="none" stroke="#ffd964" stroke-width="4" opacity="0.6">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="3;6;3" dur="2.6s" repeatCount="indefinite"/>
  </path>

  <!-- card body -->
  <path d="M240 24
           C 300 24 356 38 398 52
           L 398 420
           C 398 520 330 600 240 648
           C 150 600 82 520 82 420
           L 82 52
           C 124 38 180 24 240 24 Z"
        fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="3"/>

  <!-- inner border detail -->
  <path d="M240 40
           C 295 40 346 52 384 64
           L 384 416
           C 384 508 322 582 240 628
           C 158 582 96 508 96 416
           L 96 64
           C 134 52 185 40 240 40 Z"
        fill="none" stroke="#8a6b1f" stroke-width="1.2" opacity="0.65"/>

  <g clip-path="url(#cardClip)">
    <!-- subtle diagonal texture lines -->
    <g stroke="#8a6b1f" stroke-width="1" opacity="0.12">
      <line x1="-40" y1="120" x2="520" y2="-40"/>
      <line x1="-40" y1="220" x2="520" y2="60"/>
      <line x1="-40" y1="320" x2="520" y2="160"/>
      <line x1="-40" y1="420" x2="520" y2="260"/>
      <line x1="-40" y1="520" x2="520" y2="360"/>
      <line x1="-40" y1="620" x2="520" y2="460"/>
    </g>

    <!-- photo glow backdrop -->
    <ellipse cx="285" cy="200" rx="150" ry="150" fill="url(#photoGlow)"/>

    <!-- player silhouette (swap with your photo later) -->
    <g transform="translate(285,205)">
      <circle cx="0" cy="-45" r="42" fill="#3a2d0c"/>
      <path d="M-70 95 C -70 25 -38 5 0 5 C 38 5 70 25 70 95 Z" fill="#3a2d0c"/>
      <!-- headphones for dev vibes -->
      <path d="M-42 -50 C -42 -95 42 -95 42 -50" fill="none" stroke="#6b4f12" stroke-width="9" stroke-linecap="round"/>
      <rect x="-52" y="-58" width="13" height="26" rx="6" fill="#6b4f12"/>
      <rect x="39" y="-58" width="13" height="26" rx="6" fill="#6b4f12"/>
    </g>

    <!-- shimmer sweep across whole card -->
    <rect x="-260" y="-60" width="200" height="820" fill="url(#shine)" transform="rotate(18)">
      <animate attributeName="x" values="-360;620" dur="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- left column: rating / position / flag / club -->
  <g font-family="Arial, Helvetica, sans-serif" fill="#3a2d0c">
    <text x="128" y="128" font-size="64" font-weight="900" text-anchor="middle">99</text>
    <text x="128" y="164" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="2">SWE</text>
    <line x1="100" y1="182" x2="156" y2="182" stroke="#3a2d0c" stroke-width="2" opacity="0.7"/>
    <!-- india flag -->
    <g transform="translate(104,196)">
      <rect width="48" height="11" fill="#ff9933"/>
      <rect y="11" width="48" height="11" fill="#f6f0dc"/>
      <rect y="22" width="48" height="11" fill="#138808"/>
      <circle cx="24" cy="16.5" r="4.5" fill="none" stroke="#054187" stroke-width="1.4"/>
      <rect width="48" height="33" fill="none" stroke="#3a2d0c" stroke-width="1" opacity="0.5"/>
    </g>
    <line x1="100" y1="244" x2="156" y2="244" stroke="#3a2d0c" stroke-width="2" opacity="0.7"/>
    <!-- club badge: terminal shield -->
    <g transform="translate(104,258)">
      <path d="M24 0 L48 8 L48 26 C48 40 36 50 24 56 C12 50 0 40 0 26 L0 8 Z" fill="#3a2d0c"/>
      <text x="24" y="34" font-size="20" font-weight="900" fill="#e8c968" text-anchor="middle" font-family="Courier New, monospace">&gt;_</text>
    </g>
  </g>

  <!-- name plate -->
  <g font-family="Arial, Helvetica, sans-serif">
    <line x1="120" y1="372" x2="360" y2="372" stroke="#3a2d0c" stroke-width="2" opacity="0.5"/>
    <text x="240" y="414" font-size="40" font-weight="900" fill="#3a2d0c" text-anchor="middle" letter-spacing="3">TARUN</text>
    <line x1="120" y1="432" x2="360" y2="432" stroke="#3a2d0c" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- stats: two columns -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" fill="#3a2d0c">
    <!-- left -->
    <text x="122" y="480">97</text><text x="168" y="480" font-weight="600">PYT</text>
    <text x="122" y="524">96</text><text x="168" y="524" font-weight="600">BCK</text>
    <text x="122" y="568">98</text><text x="168" y="568" font-weight="600">API</text>
    <!-- right -->
    <text x="256" y="480">95</text><text x="302" y="480" font-weight="600">JAV</text>
    <text x="256" y="524">94</text><text x="302" y="524" font-weight="600">ML</text>
    <text x="256" y="568">93</text><text x="302" y="568" font-weight="600">DBS</text>
    <!-- divider -->
    <line x1="240" y1="452" x2="240" y2="578" stroke="#3a2d0c" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- animated stat underline bars -->
  <g fill="url(#bar)" opacity="0.85">
    <rect x="122" y="488" height="4" rx="2" width="0">
      <animate attributeName="width" values="0;92" dur="1.1s" fill="freeze"/>
    </rect>
    <rect x="122" y="532" height="4" rx="2" width="0">
      <animate attributeName="width" values="0;90" dur="1.3s" fill="freeze"/>
    </rect>
    <rect x="122" y="576" height="4" rx="2" width="0">
      <animate attributeName="width" values="0;95" dur="1.5s" fill="freeze"/>
    </rect>
    <rect x="256" y="488" height="4" rx="2" width="0">
      <animate attributeName="width" values="0;88" dur="1.2s" fill="freeze"/>
    </rect>
    <rect x="256" y="532" height="4" rx="2" width="0">
      <animate attributeName="width" values="0;85" dur="1.4s" fill="freeze"/>
    </rect>
    <rect x="256" y="576" height="4" rx="2" width="0">
      <animate attributeName="width" values="0;82" dur="1.6s" fill="freeze"/>
    </rect>
  </g>

  <!-- bottom tag -->
  <text x="240" y="622" font-family="Courier New, monospace" font-size="14" font-weight="700"
        fill="#3a2d0c" text-anchor="middle" letter-spacing="2" opacity="0.8">ULTIMATE DEV EDITION</text>
</svg>
